# ──────────────────────────────────────────────────────────────────────────────
# retrain.yml  —  Scheduled Model Retraining
#
# Triggers : every Sunday at 02:00 UTC (weekly)
#            manual trigger via workflow_dispatch with custom params
#
# What it does:
#   1. Trains a fresh model with configurable hyperparameters
#   2. Compares new AUC against the current production model
#   3. Only promotes the new model if AUC improves by at least 0.5%
#   4. If promoted: commits updated artifacts back to the repo
#      and triggers the CD pipeline to redeploy
#   5. Posts a detailed comparison report to GitHub step summary
#
# Required GitHub Secrets:
#   GITHUB_TOKEN  — automatically provided by GitHub Actions (no setup needed)
# ──────────────────────────────────────────────────────────────────────────────

name: Retrain model

on:
  schedule:
    - cron: "0 2 * * 0"           # every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "XGBoost n_estimators"
        required: false
        default: "200"
        type: string
      max_depth:
        description: "XGBoost max_depth"
        required: false
        default: "4"
        type: string
      learning_rate:
        description: "XGBoost learning_rate"
        required: false
        default: "0.1"
        type: string
      force_promote:
        description: "Promote even if AUC doesn't improve"
        required: false
        default: "false"
        type: choice
        options: [true, false]

env:
  PYTHON_VERSION: "3.11"
  AUC_IMPROVEMENT_THRESHOLD: "0.005"   # minimum AUC gain to promote (0.5%)

jobs:

  retrain:
    name: Retrain & evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt
        env:
          PYTHONIOENCODING: utf-8

      - name: Read current model AUC (baseline)
        id: baseline
        run: |
          python3 - << 'EOF'
          import json, os
          try:
              with open("model_artifacts/metadata.json", "r", encoding="utf-8") as f:
                  meta = json.load(f)
              auc = meta.get("roc_auc", 0.0)
          except FileNotFoundError:
              auc = 0.0
          print(f"Current AUC: {auc}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"auc={auc}\n")
          EOF

      - name: Train new model
        run: |
          python train.py \
            --experiment-name "retrain_$(date +%Y%m%d)" \
            --n-estimators ${{ github.event.inputs.n_estimators || '200' }} \
            --max-depth    ${{ github.event.inputs.max_depth    || '4'   }} \
            --learning-rate ${{ github.event.inputs.learning_rate || '0.1' }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Read new model AUC
        id: new_model
        run: |
          python3 - << 'EOF'
          import json, os
          with open("model_artifacts/metadata.json", "r", encoding="utf-8") as f:
              meta = json.load(f)
          auc     = meta.get("roc_auc", 0.0)
          run_id  = meta.get("run_id", "unknown")
          print(f"New AUC: {auc}  Run ID: {run_id}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"auc={auc}\n")
              fh.write(f"run_id={run_id}\n")
          EOF

      - name: Run tests against new model
        run: pytest tests/ -v --tb=short
        env:
          PYTHONIOENCODING: utf-8

      - name: Compare AUC and decide on promotion
        id: promote
        run: |
          python3 - << 'EOF'
          import os

          current_auc = float("${{ steps.baseline.outputs.auc }}")
          new_auc     = float("${{ steps.new_model.outputs.auc }}")
          threshold   = float(os.environ["AUC_IMPROVEMENT_THRESHOLD"])
          force       = "${{ github.event.inputs.force_promote }}" == "true"

          improvement = new_auc - current_auc
          should_promote = force or (improvement >= threshold)

          print(f"Current AUC  : {current_auc:.4f}")
          print(f"New AUC      : {new_auc:.4f}")
          print(f"Improvement  : {improvement:+.4f}")
          print(f"Threshold    : {threshold}")
          print(f"Force promote: {force}")
          print(f"Decision     : {'PROMOTE' if should_promote else 'KEEP CURRENT'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_promote={'true' if should_promote else 'false'}\n")
              fh.write(f"improvement={improvement:.4f}\n")
          EOF

      - name: Promote model — commit artifacts back to repo
        if: steps.promote.outputs.should_promote == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_artifacts/
          git commit -m "chore: promote new model (AUC ${{ steps.new_model.outputs.auc }}, run ${{ steps.new_model.outputs.run_id }})"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write retraining report
        if: always()
        run: |
          python3 - << 'EOF'
          import os

          current = float("${{ steps.baseline.outputs.auc }}")
          new_auc = float("${{ steps.new_model.outputs.auc }}")
          improve = float("${{ steps.promote.outputs.improvement }}")
          promoted = "${{ steps.promote.outputs.should_promote }}" == "true"
          status = "Promoted" if promoted else "Kept current"
          emoji  = "green_circle" if promoted else "yellow_circle"

          lines = [
              "## Retraining Report",
              "",
              f"| Metric | Value |",
              f"|---|---|",
              f"| Current AUC | `{current:.4f}` |",
              f"| New AUC     | `{new_auc:.4f}` |",
              f"| Improvement | `{improve:+.4f}` |",
              f"| Decision    | :{emoji}: {status} |",
              f"| Run ID      | `${{ steps.new_model.outputs.run_id }}` |",
              "",
          ]
          if promoted:
              lines += [
                  "### Next step",
                  "Model artifacts committed to `main`. CD pipeline will redeploy automatically.",
              ]
          else:
              lines += [
                  "### Next step",
                  "AUC improvement below threshold — current production model kept.",
                  "Use `workflow_dispatch` with `force_promote=true` to override.",
              ]

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n".join(lines))
          EOF
