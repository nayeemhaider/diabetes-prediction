[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Show extra test summary info for all but passed
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests that require a live API

# Minimum test coverage — also enforced in CI via --cov-fail-under
# (set here as documentation; CI flag takes effect during workflow runs)
