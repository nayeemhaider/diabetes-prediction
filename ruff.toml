# ruff.toml — Ruff linter + formatter configuration
# Docs: https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py311"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (FastAPI pattern)
    "UP007", # use X | Y for type union (keep Optional for clarity)
]

[lint.per-file-ignores]
"tests/*" = ["S101"]     # allow assert in tests
"train.py" = ["T201"]    # allow print() in training script

[format]
quote-style = "double"
indent-style = "space"
