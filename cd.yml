# ──────────────────────────────────────────────────────────────────────────────
# cd.yml  —  Continuous Delivery  (Railway deployment, no Docker)
#
# Triggers : push to main (i.e. a PR was merged)
#            manual trigger via workflow_dispatch
#
# What it does:
#   1. Runs the full test suite + smoke test as a gate
#   2. Triggers a Railway redeploy via Railway's deploy hook URL
#   3. Waits and polls the live /health endpoint until the new
#      version is up (or times out after 3 minutes)
#   4. Posts a deployment summary to GitHub
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   RAILWAY_DEPLOY_HOOK_URL — from Railway dashboard
#                             Project → Settings → Deploy Hooks → Create hook
#   RAILWAY_PUBLIC_URL      — your Railway app URL, e.g.
#                             https://diabetes-prediction.up.railway.app
# ──────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: Test + smoke gate ─────────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Train model
        run: python train.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONIOENCODING: utf-8

      - name: Start API and run smoke test
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 6
          curl --retry 5 --retry-delay 2 --retry-connrefused \
            --fail --silent http://localhost:8000/health
          echo "Smoke test passed"
          kill %1 2>/dev/null || true
        env:
          PYTHONIOENCODING: utf-8


  # ── Job 2: Deploy to Railway ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Railway redeploy
        run: |
          echo "Triggering Railway deploy hook..."
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}")
          echo "Railway responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Deploy hook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Wait for Railway to deploy
        run: |
          echo "Polling ${{ secrets.RAILWAY_PUBLIC_URL }}/health ..."
          MAX_ATTEMPTS=18        # 18 x 10s = 3 minutes
          ATTEMPT=0
          until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
            HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 8 \
              "${{ secrets.RAILWAY_PUBLIC_URL }}/health" || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "Railway is healthy after $((ATTEMPT * 10))s"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — got HTTP $HTTP, waiting 10s..."
            sleep 10
          done
          if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
            echo "Deployment did not become healthy in time"
            exit 1
          fi

      - name: Verify live prediction endpoint
        run: |
          RESPONSE=$(curl --silent --fail --show-error \
            -X POST "${{ secrets.RAILWAY_PUBLIC_URL }}/predict" \
            -H "Content-Type: application/json" \
            -d '{"Pregnancies":2,"Glucose":120,"BloodPressure":72,"SkinThickness":20,"Insulin":80,"BMI":28.5,"DiabetesPedigreeFunction":0.35,"Age":33}')
          echo "Live prediction response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'probability' in d and 'label' in d and 'risk_band' in d
          print('Live endpoint verified OK')
          "

      - name: Write deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform     | Railway |" >> $GITHUB_STEP_SUMMARY
          echo "| URL          | ${{ secrets.RAILWAY_PUBLIC_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit       | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API is live at:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.RAILWAY_PUBLIC_URL }}/docs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
